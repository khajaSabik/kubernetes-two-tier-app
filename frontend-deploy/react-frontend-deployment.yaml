apiVersion: apps/v1
kind: Deployment
metadata:
    name: frontend-deployment
spec:
    replicas: 1
    selector:
        matchLabels:
            component: frontend-deployment
    template:
        metadata:
            labels:
                component: frontend-deployment
        spec:
            containers:
                - name: frontend
                  image: khajasabik/kube-frontend:v5
                  ports:
                    - containerPort: 80

---

apiVersion: v1
kind: Service
metadata:
    name: frontend-nodeport-service
spec:
    type: NodePort
    selector:
        component: frontend-deployment
    ports:
        - port: 80
          targetPort: 80
          nodePort: 30006



---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: example-ingress
spec:
  ingressClassName: nginx
  rules:
    - host: hello-world.example
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-nodeport-service
                port:
                  number: 80
